<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HSR Message Simulator</title>
  <link rel="stylesheet" href="src/style.css">
  <script type="module" src="src/main.js"></script>
</head>
<body id="main-body" class="bg-[#181D3F] h-screen overflow-hidden">
  <div class="absolute inset-0 bg-[url(/assets/background.png)] bg-cover"></div>
  <div id="app-container" class="relative flex flex-col h-full w-full px-4 md:px-16 xl:px-[10%] backdrop-blur-sm">
    <div id="header" class="flex flex-row w-full items-center justify-between p-4 shrink-0">
      <div id="header-title-container" class="flex flex-row items-center gap-2">
          <img id="header-icon" class="w-8 h-8" src="/assets/icons/chat.svg">
          <p id="header-title" class="text-white text-sm">Messages</p>
      </div>
    </div>
    <div id="main-content-area" class="flex flex-row w-full flex-1 min-h-0 p-4">
      <div id="content-wrapper" class="flex flex-row h-full w-full gap-4 relative">
        <div id="contact-list-container" class="flex flex-col h-full w-full md:w-[30%] md:min-w-[280px] md:max-w-[420px] shrink-0 overflow-y-auto overflow-x-hidden gap-2 pr-0 md:pr-2 contact-scroll">
        </div>
        <button id="add-contact-btn" class="absolute bottom-4 left-4 md:bottom-4 md:left-4 bg-[#1A1A1A]/90 text-[#D8D8D9] w-14 h-14 border border-[#6C6C6C] rounded-full text-3xl flex items-center justify-center shadow-[0_4px_12px_rgba(0,0,0,0.4)] hover:bg-white hover:text-black hover:scale-105 backdrop-blur-md transition-all z-10 md:z-10">+</button>
        <div id="chat-panel" class="relative hidden md:flex flex-col w-full h-full bg-gray-600/40 rounded-tr-xl flex-1 min-w-0">
        <div id="chat-panel-shadow" class="absolute inset-0 w-full h-full border-1 border-[#3D3D43] translate-x-[-5px] translate-y-[5px] -z-10 hidden md:block"></div>
          <div id="chat-placeholder" class="flex flex-col items-center justify-center h-full">
            <img src="/assets/icons/empty_chat.png">
            <p class="text-[#B9BAC1]">Please select a contact</p>
          </div>

          <div id="chat-content-wrapper" class="hidden flex-col w-full h-full">
            <div id="chat-header" class="flex flex-row items-center p-4 border-b-2 border-[#B6B6B5]">
              <button id="mobile-back-btn" type="button" class="md:hidden mr-4 text-black hover:opacity-70 focus:outline-none shrink-0 transition-opacity">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
              </button>
              <div class="flex flex-col pl-4 min-w-0 flex-1">
                <p id="chat-header-name" class="text-black text-md">Ruan Mei</p>
                <p id="chat-header-bio" class="text-[#6C6C6C] text-sm truncate">Those are new cakes... where did you get them?</p>
              </div>
              <button id="export-image-btn" type="button" class="ml-4 bg-[#1A1A1A] hover:bg-black text-[#D8D8D9] hover:text-white text-xs font-bold py-1.5 px-3 rounded-full border border-[#3A3A3A] focus:outline-none transition-colors shadow-md flex items-center gap-1 shrink-0" title="Export Chat as Image">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
                <span class="hidden md:inline">Export</span>
              </button>
              <button id="clear-chat-btn" type="button" class="ml-2 bg-[#1A1A1A] hover:bg-red-800 text-[#D8D8D9] hover:text-white text-xs font-bold py-1.5 px-3 rounded-full border border-[#3A3A3A] focus:outline-none transition-colors shadow-md flex items-center gap-1 shrink-0" title="Clear Chat">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
                <span class="hidden md:inline">Clear</span>
              </button>
            </div>
            <div id="chat-conversation" class="flex flex-col flex-1 w-full min-h-0 p-8 gap-4 overflow-y-auto overflow-x-hidden chat-scroll">
              <div class="chat-message-container flex flex-row w-full items-start gap-2">
                <img src="/assets/profile_avatars/ruanmei.png" class="chat-avatar rounded-full w-12 h-12" alt="Ruan Mei">
                <div class="chat-content flex flex-col gap-1 max-w-[50%]">
                  <p class="chat-sender-name text-[#6C6C6C] text-sm">Ruan Mei</p>
                    <div class="relative w-fit max-w-full">
                      <div class="absolute inset-0 bg-[#B6B6B5] rounded-[10px] rounded-tl-none translate-x-[-1px] translate-y-[2px]"></div>
                      <p class="chat-message-text break-words relative bg-white rounded-[10px] rounded-tl-none p-2 px-4">Hello dear viewer.</p>
                    </div>
                </div>
              </div>
              <div class="chat-message-container flex flex-row w-full items-start gap-2">
                <img src="/assets/profile_avatars/ruanmei.png" class="chat-avatar rounded-full w-12 h-12" alt="Ruan Mei">
                <div class="chat-content flex flex-col gap-1 max-w-[50%]">
                  <p class="chat-sender-name text-[#6C6C6C] text-sm">Ruan Mei</p>
                    <div class="relative w-fit max-w-full">
                      <div class="absolute inset-0 bg-[#B6B6B5] rounded-[10px] rounded-tl-none translate-x-[-1px] translate-y-[2px]"></div>
                      <p class="chat-message-text break-words relative bg-white rounded-[10px] rounded-tl-none p-2 px-4">I've set aside some rewards you can collect anytime soon.</p>
                    </div>
                </div>
              </div>
            </div>

            <div id="chat-input-area" class="p-4 border-t-2 border-[#B6B6B5] mt-auto">
              <form id="send-message-form" class="flex items-center gap-2 md:gap-3 relative">
                <div id="sender-select-btn" class="flex flex-col items-center justify-center cursor-pointer p-1 rounded-lg hover:bg-[#C9C9C9] w-12 md:w-16 shrink-0 transition-all">
                  <label class="text-[9px] text-[#6C6C6C] pointer-events-none mb-1 font-bold tracking-widest uppercase hidden md:block">Send As</label>
                  <img id="current-sender-avatar" src="/assets/profile_avatars/stelle(destruction).webp" onerror="this.src='/assets/profile_avatars/trailblazer.webp'" class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-black pointer-events-none object-cover">
                  <input type="hidden" id="current-sender-name" value="Stelle (Destruction)">
                </div>
                <button type="button" id="message-side-toggle" data-side="right" class="flex flex-col items-center justify-center cursor-pointer p-1 rounded-lg hover:bg-[#C9C9C9] w-12 md:w-16 shrink-0 transition-all">
                  <label class="text-[9px] text-[#6C6C6C] pointer-events-none mb-1 font-bold tracking-widest uppercase hidden md:block">Side</label>
                  <div id="side-toggle-text" class="h-8 md:h-8 flex items-center justify-center font-bold text-gray-800 text-xs pointer-events-none">RIGHT</div>
                </button>
                <input type="text" id="message-input" class="flex-1 p-2 md:p-3 px-4 md:px-5 rounded-full border border-[#B6B6B5] bg-[#EAEAEA] focus:bg-white focus:outline-none focus:border-[#6C6C6C] transition-all text-black placeholder-gray-500 shadow-inner min-w-0" placeholder="Type a message...">
                <button type="submit" class="p-2 md:p-3 bg-[#1A1A1A] text-[#D8D8D9] rounded-full hover:bg-black hover:text-white font-bold px-4 md:px-8 transition-colors shadow-md border border-[#3A3A3A] shrink-0">Send</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="add-contact-modal" class="hidden fixed inset-0 backdrop-blur-md bg-black/40 flex items-center justify-center p-4 z-50 transition-opacity">
    <div class="bg-[#F8F9FA] border-2 border-[#D8D8D9] p-8 rounded shadow-2xl max-w-2xl w-full flex flex-col max-h-full relative">
      <h2 class="text-xl text-black font-bold mb-6 shrink-0 uppercase tracking-widest border-b-2 border-black/10 pb-2">Add New Contact</h2>
      <form id="add-contact-form" class="flex flex-col min-h-0">
        <div class="mb-4 shrink-0">
          <label class="block text-gray-800 text-[11px] font-bold mb-2 uppercase tracking-wide">Contact Type</label>
          <div class="flex items-center gap-4 text-sm font-medium">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" id="type-existing" name="contact-type" value="existing" checked class="accent-[#D2B47E]">
              <span>Existing Character</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" id="type-custom" name="contact-type" value="custom" class="accent-[#D2B47E]">
              <span>Custom</span>
            </label>
          </div>
        </div>

        <div id="existing-character-fields" class="flex flex-col min-h-0 overflow-hidden">
          <label class="block text-gray-800 text-[11px] font-bold mb-2 shrink-0 uppercase tracking-wide">Select Character</label>
          <input type="hidden" id="selected-character-name" value="">
          <div id="character-grid-container" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 gap-4 overflow-y-auto p-4 border border-[#C4C4C4] rounded bg-white flex-1 shadow-inner chat-scroll">
          </div>
        </div>

        <div id="custom-character-fields" class="hidden shrink-0 space-y-4">
          <div>
            <label for="custom-name" class="block text-gray-800 text-[11px] font-bold mb-2 uppercase tracking-wide">Name</label>
            <input type="text" id="custom-name" class="appearance-none border border-[#C4C4C4] bg-white rounded-full w-full py-3 px-5 text-gray-700 leading-tight focus:outline-none focus:border-[#6C6C6C] transition-colors shadow-inner" placeholder="Enter name">
          </div>
          <div>
            <label for="custom-bio" class="block text-gray-800 text-[11px] font-bold mb-2 uppercase tracking-wide">Bio</label>
            <input type="text" id="custom-bio" class="appearance-none border border-[#C4C4C4] bg-white rounded-full w-full py-3 px-5 text-gray-700 leading-tight focus:outline-none focus:border-[#6C6C6C] transition-colors shadow-inner" placeholder="Enter bio">
          </div>
          <div>
            <label for="custom-avatar" class="block text-gray-800 text-[11px] font-bold mb-2 uppercase tracking-wide">Upload Avatar</label>
            <input type="file" id="custom-avatar" accept="image/*" class="appearance-none border border-[#C4C4C4] bg-white rounded-full w-full py-2 px-5 text-gray-700 leading-tight focus:outline-none focus:border-[#6C6C6C] transition-colors shadow-inner file:mr-4 file:py-1 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-[#1A1A1A] file:text-[#D8D8D9] hover:file:bg-black">
          </div>
        </div>

        <div class="flex items-center justify-end mt-8 shrink-0 gap-3">
          <button id="close-modal-btn" type="button" class="bg-transparent border-2 border-[#6C6C6C] hover:bg-[#EAEAEA] text-gray-800 font-bold py-2 px-8 rounded-full focus:outline-none transition-colors">
            Cancel
          </button>
          <button id="save-contact-btn" type="submit" class="bg-[#1A1A1A] hover:bg-black text-[#D8D8D9] hover:text-white font-bold py-2 px-8 rounded-full border border-[#3A3A3A] focus:outline-none transition-colors shadow-md">
            Confirm
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="sender-modal" class="hidden fixed inset-0 backdrop-blur-md bg-black/40 flex items-center justify-center p-4 z-50 transition-opacity">
    <div class="bg-[#F8F9FA] border-2 border-[#D8D8D9] p-8 rounded shadow-2xl max-w-2xl w-full flex flex-col max-h-full relative">
      <div class="flex items-center justify-between mb-6 shrink-0 border-b-2 border-black/10 pb-2">
        <h2 class="text-xl text-black font-bold uppercase tracking-widest">Select Sender</h2>
        <button id="close-sender-modal-btn" type="button" class="text-gray-500 hover:text-black font-bold text-3xl transition-colors">&times;</button>
      </div>
      <div id="sender-grid-container" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 gap-4 overflow-y-auto p-4 border border-[#C4C4C4] rounded bg-white flex-1 shadow-inner chat-scroll">
      </div>
    </div>
  </div>
</body>
</html>
